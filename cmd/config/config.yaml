# 学生网管课程表解析系统 - 全局配置

# 全局信息配置
globals:
  # 组织名称
  organization: "学生网管"
  # 校区名称
  campus: "科学"
  # 学期代码，如 20251 表示 2025-2026 学年第二学期
  semester_code: "20251"
  # 学期开始日期（第一周周一）
  semester_start: "2026-03-02"
  # 学期总周数
  total_weeks: 21
  # 复习周（不排班）
  exam_review_weeks: [20,21]

# 课程时间映射表（为后续 iCal 功能铺垫）
time_slots:
  - period: "1-2"
    start: "08:00"
    end: "09:40"
  - period: "3-4"
    start: "10:00"
    end: "11:40"
  - period: "5-6"
    start: "14:30"
    end: "16:10"
  - period: "7-8"
    start: "16:30"
    end: "18:10"
  - period: "9-10"
    start: "19:30"
    end: "21:30"

# AI 接口配置
ai:
  # API 模式: "openai" (默认, 兼容OpenAI格式) 或 "claude" (Anthropic Claude格式)
  api_mode: "openai"
  # API 地址
  # OpenAI模式: https://api.deepseek.com/chat/completions
  # Claude模式: https://api.anthropic.com/v1/messages
  base_url: "https://api.deepseek.com/chat/completions"
  # 模型名称
  # OpenAI模式: deepseek-chat, gpt-4, etc.
  # Claude模式: claude-3-5-sonnet-20241022, claude-3-opus-20240229, etc.
  model: "deepseek-chat"
  # 并发数限制
  concurrency: 5
  # 重试次数
  max_retries: 3
  # 请求间隔（毫秒）
  request_interval: 500

# 路径配置
paths:
  # 输入目录
  input: "./input"
  # 输出根目录
  output: "./output"
  # ICS 日历输出目录
  ics: "./output/ics"
  # 临时目录
  temp_raw: "./output/temp/raw_xls"
  temp_simplified: "./output/temp/simplified_xls"
  temp_split_2d: "./output/temp/split/2d_table"
  temp_split_list: "./output/temp/split/list"
  # CSV 标准化输出
  csv_normalized: "./output/csv_normalized"
  # 最终 Excel 输出
  final: "./output/final"
  # 错误日志
  error_log: "./output/error.log"

# 解析配置
parser:
  # 列表格式全占用策略（环节是否占用全部工作日）
  type1_full_occupy: true
  # CSV 编码
  csv_encoding: "utf-8-sig"

# Excel 样式配置
excel:
  # 表头样式
  header:
    # 字体大小
    font_size: 10
    # 是否加粗
    bold: true
    # 背景颜色 (空或"none"表示无背景)
    bg_color: "none"
    # 文字颜色
    font_color: "#000000"
    # 底部边框
    border_bottom: false
    # 行高
    row_height: 20

  # 数据行样式
  data:
    # 行高
    row_height: 80
    # 自动换行
    wrap_text: true

  # 第一列（节次列）专用样式
  first_column:
    # 字体大小
    font_size: 10
    # 是否加粗
    bold: true
    # 背景颜色
    bg_color: "none"
    # 文字颜色
    font_color: "#000000"
    # 水平对齐方式
    align: "center"
    # 列宽
    width: 5
  column:
    # 最小列宽
    min_width: 8
    # 最大列宽
    max_width: 30
    # 字符宽度系数
    char_width_factor: 1.2

  # 表格内容设置
  table:
    # 节次范围 (1-4表示1-2,3-4,5-6,7-8节)
    max_periods: 4
